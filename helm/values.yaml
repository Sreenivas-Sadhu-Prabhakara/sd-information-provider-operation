# Default values for sd-information-provider-operation (BIAN Service Domain: Information Provider Operation)

image:
  repository: bian/sd-information-provider-operation
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Namespace is set per BIAN business area by deploy-all.sh (helm -n <ns>).
# These labels ride on every object for mesh policy + observability slicing.
bian:
  serviceDomain: "information-provider-operation"
  businessArea: "reference-data"
  businessDomain: "reference-data"
  functionalPattern: "operate"

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

# Gateway API route (Cilium implements Gateway API natively — no ingress controller)
route:
  enabled: true
  gatewayName: bian-gateway
  gatewayNamespace: bian-system
  # External path prefix; rewritten to / before hitting the service
  pathPrefix: /sd-information-provider-operation

# CiliumNetworkPolicy — default-deny posture, explicit allows
networkPolicy:
  enabled: true
  monitoringNamespace: monitoring
